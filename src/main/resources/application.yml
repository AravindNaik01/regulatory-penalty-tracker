spring:
  application:
    name: regulatory-penalty-tracker
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/penalty_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    url: ${DB_URL:jdbc:postgresql://localhost:5432/penalty_db}
    user: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:naikaravind27@gmail.com}
    password: ${MAIL_PASSWORD:***REMOVED***}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  admin-email: ${ADMIN_EMAIL:naikaravind27@gmail.com}
  jwt:
    secret: ${JWT_SECRET:your_super_secret_key_which_should_be_long_enough_for_hs256_algorithm}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours
