version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_URL=${DB_URL:-jdbc:postgresql://postgres:5432/penalty_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - JWT_SECRET=${JWT_SECRET}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - penalty_net

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-penalty_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d penalty_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - penalty_net
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - penalty_net

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "echo 'Frontend placeholder' && tail -f /dev/null"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "echo 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - penalty_net

  ai-service:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "echo 'AI Service placeholder' && tail -f /dev/null"
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "echo 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - penalty_net

volumes:
  pgdata:

networks:
  penalty_net:
